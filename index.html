<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sammy Store</title>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:white;
text-align:center;
}

/* Loading Screen */
#loadingScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999;
}

video{
width:100%;
max-width:400px;
border-radius:10px;
}

.skipBtn{
margin-top:15px;
padding:10px 20px;
background:red;
border:none;
color:white;
font-size:16px;
border-radius:8px;
}

/* Main Content */
#mainContent{
display:none;
padding:20px;
}

.contactText a{
color:#00ffcc;
text-decoration:none;
font-size:18px;
}
</style>

</head>
<body>

<!-- LOADING VIDEO -->
<div id="loadingScreen">

<video id="loadingVideo" autoplay muted>
<source src="intro.mp4" type="video/mp4">
</video>

<button class="skipBtn" onclick="skipVideo()">Skip</button>

</div>

<!-- MAIN WEBSITE -->
<div id="mainContent">

<h1>Sammy Store</h1>

<div class="contactText">
💬 <a href="https://t.me/sennojasbug" target="_blank">t.me/sennojasbug</a>
</div>

</div>

<script>

let video = document.getElementById("loadingVideo");
let loading = document.getElementById("loadingScreen");
let main = document.getElementById("mainContent");

/* supaya suara aktif setelah tap */
document.body.addEventListener("click", function(){
video.muted=false;
video.play();
});

/* jika video selesai */
video.onended=function(){
showMain();
}

function skipVideo(){
showMain();
}

function showMain(){
loading.style.display="none";
main.style.display="block";
}

</script>

</body>
</html>
