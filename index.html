    background:linear-gradient(135deg,#000814,#001d3d,#000814);  
    background-size:200% 200%;  
    animation:bgMove 8s ease infinite;  
    text-align:center;  
    color:white;

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

/* LOADING SCREEN */
#loadingScreen{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
}

#loadingVideo{
width:100%;
height:100%;
object-fit:cover;
}

#tapText{
position:absolute;
bottom:80px;
font-size:20px;
font-weight:bold;
animation:blink 1s infinite;
}

@keyframes blink{
50%{opacity:0;}
}

#skipBtn{
position:absolute;
top:20px;
right:20px;
padding:8px 15px;
background:red;
border-radius:8px;
cursor:pointer;
font-weight:bold;
color:white;
}

/* MAIN CONTENT */
#mainContent{
display:none;
padding-top:20px;
}

.h1main{
font-size:32px;
font-weight:bold;

/* LINKS */
.linkBtn{
display:block;
background:rgba(10,10,10,0.85);
color:#00b4ff;
padding:15px;
margin:12px auto;
width:90%;
max-width:400px;
border-radius:40px;
text-decoration:none;
font-weight:bold;
transition:0.3s ease;
border:1px solid rgba(0,180,255,0.5);
box-shadow:0 0 15px rgba(0,180,255,0.4);
animation:goyang 2s infinite;
}

@keyframes goyang{
0%{transform:rotate(0deg);}
25%{transform:rotate(1deg);}
50%{transform:rotate(0deg);}
75%{transform:rotate(-1deg);}
100%{transform:rotate(0deg);}
}

.linkBtn i{
margin-right:8px;
}

.linkBtn:hover{
transform:scale(1.07);
background:#001d3d;
}

.footerText{

.contactText{
